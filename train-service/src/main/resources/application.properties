spring.application.name=train-service

# 配置swagger 文檔的訪問路徑
springdoc.swagger-ui.path=/swagger-ui.html

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/tutorial?useUnicode=yes&characterEncoding=UTF-8&useSSL=false&serverTimezone=GMT%2B8
spring.datasource.username=root
spring.datasource.password=root

# Spring Data JPA
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Token
jwt.secret.key=FRaNlJmM1RzRlNhYl123FRaNlJmM1RzRlNhYl123898
jwt.token-expiration-seconds=3600
# 是否啟用 JWToken
jwt.auth.enabled=true

# Auth-Service
auth.endpoint.service=localhost:8088

# Rabbit MQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin
# 連接到 RabbitMQ 伺服器的逾時時間 (30s)
spring.rabbitmq.connection-timeout=30000
# 與 RabbitMQ 伺服器的心跳間隔（以秒為單位）
spring.rabbitmq.requested-heartbeat=60

# 自動消費
spring.rabbitmq.listener.simple.acknowledge-mode=auto
# 手動消費
#spring.rabbitmq.listener.simple.acknowledge-mode=manual
# 設定訊息處理失敗時是否將訊息重新入隊。
spring.rabbitmq.listener.simple.default-requeue-rejected=true
# 消費者的初始並發數
spring.rabbitmq.listener.simple.concurrency=1
# 設定消費者的最大並發數
spring.rabbitmq.listener.simple.max-concurrency=5


# Exange Name
rabbitmq.exchange.name=topic-order-exchange
# topic-queue 名稱，格式: topic.名稱
rabbitmq.topic.test=topic.test
rabbitmq.topic.account.transaction=topic.account.transaction

rabbitmq.account.saga.compensation=topic.account.saga.compensation
rabbitmq.account.saga.start=topic.account.saga.start
rabbitmq.account.saga.completion=topic.account.saga.completion
rabbitmq.account.saga.failure=topic.account.saga.failure


# Exange Name
#rabbitmq.booking.exchange=topic-booking-exchange
rabbitmq.booking.saga.start=topic.booking.saga.start
rabbitmq.booking.saga.process=topic.booking.saga.process
rabbitmq.booking.saga.completion=topic.booking.saga.completion
rabbitmq.booking.saga.compensation=topic.booking.saga.compensation
rabbitmq.booking.saga.failure=topic.booking.saga.failure

rabbitmq.booking.saga.cancel=topic.booking.saga.cancel


# 發送者開啟 return 確認機制
#spring.rabbitmq.publisher-returns=true
# 傳送者開啟 confirm 確認機制
#spring.rabbitmq.publisher-confirm-type: correlated

# Min IO
minio.endpoint=http://localhost:9000
# MinIO 使用者 ID（類似帳號）
minio.accessKey=admin
# MinIO 使用者的密碼（類似 API 密鑰）
minio.secretKey=admin123
minio.bucketName=train

#### Mail ####
# 設定郵件服務的 SMTP 服務器。
spring.mail.host=localhost
# 設定郵件服務的 SMTP 服務器端口。
spring.mail.port=1025
# 設定郵件服務的用戶名。
spring.mail.username=''
# 設定郵件服務的密碼。
spring.mail.password=''
# 在郵件傳輸過程中使用 TLS（Transport Layer Security）加密協議，從而提高郵件的安全性，由於此處為測試故關閉
spring.mail.properties.mail.smtp.auth=false
# 設定郵件服務的 SMTP 身份驗證，由於此處為測試故關閉。
spring.mail.properties.mail.smtp.starttls.enable=false
# 發送郵件時等待寫入操作完成的最大時間（毫秒）。
spring.mail.properties.mail.smtp.writetimeout=5000

# 顯示給使用者看的發信人地址(系統發信信箱)
mail.from.address=no-reply@train-system.com
# 自定義顯示名稱
mail.from.name=Train Booking System
